defaults:
- _self_
- serve: robobrain_x0

experiment:
  exp_name: robobrain_x0
  exp_dir: outputs/${experiment.exp_name}
  task:
    type: serve
    entrypoint: flagscale/serve/run_serve_robobrain_x0_agilex.py
  runner:
    hostfile: null
    deploy:
      use_fs_serve: false
  envs:
    CUDA_VISIBLE_DEVICES: 2
    CUDA_DEVICE_MAX_CONNECTIONS: 1

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
