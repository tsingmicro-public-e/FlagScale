defaults:
  - _self_
  - serve: 7b

experiment:
  exp_name: robobrain
  exp_dir: outputs/${experiment.exp_name}
  task:
    type: serve
    backend: vllm
    entrypoint: null
  runner:
    hostfile: null #examples/robobrain/conf/hostfile.txt
    docker: robobrain
    ssh_port: 22
    deploy:
      port: 6701
      use_fs_serve: true

  cmds:
    before_start: export RAY_DEDUP_LOGS=0

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
