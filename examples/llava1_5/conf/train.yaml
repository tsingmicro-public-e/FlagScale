defaults:
  - train: 7b
  - _self_

experiment:
  exp_name: llava1.5
  exp_dir: ./outputs_llava1.5
  task:
    type: train
    backend: megatron
    entrypoint: ./flagscale/train/megatron/train_llava.py
  runner:
    nnodes: 4
    nproc_per_node: 8
    hostfile: <xxx>
  envs:
    CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
    CUDA_DEVICE_MAX_CONNECTIONS: 1
    NVTE_APPLY_QK_LAYER_SCALING: 0
    NVTE_ALLOW_NONDETERMINISTIC_ALGO: 0

action: run

hydra:
  run:
    dir: ${experiment.exp_dir}/hydra
