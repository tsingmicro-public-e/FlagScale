engine:
  model: ${experiment.model}
  loader: diffusers
  torch_dtype: bfloat16
  device: cuda
  results_path: ${experiment.exp_dir}/results
  output_format: "image"

generate:
  prompts: '''A coffee shop entrance features a chalkboard sign reading "Qwen Coffee 😊 $2 per cup," with a neon light beside it displaying "通义千问". Next to it hangs a poster showing a beautiful Chinese woman, and beneath the poster is written "π≈3.1415926-53589793-23846264-33832795-02384197". Ultra HD, 4K, cinematic composition'''
  negative_prompt: ''
  height: 928
  width: 1664
  num_inference_steps: 50
  true_cfg_scale: 4.0
  generator:
    device: cuda
    seed: 0
