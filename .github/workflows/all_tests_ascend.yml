name: ascend_tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'docker/cuda/**'
      - 'docker/build.sh'
      - 'tools/install/**'
      - 'requirements/**'
      - '.github/workflows/build_image_cuda.yml'
      - '.github/workflows/push_image_harbor.yml'
  pull_request:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - 'docker/cuda/**'
      - 'docker/build.sh'
      - 'tools/install/**'
      - 'requirements/**'
      - '.github/workflows/build_image_cuda.yml'
      - '.github/workflows/push_image_harbor.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  run_tests:
    uses: ./.github/workflows/all_tests_common.yml
    with:
      platform: ascend

  all_tests:
    needs: run_tests
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify workflow status
        run: |
          if [ "${{ needs.run_tests.result }}" != "success" ]; then
            echo "❌ Tests workflow failed"
            exit 1
          fi
          echo "✅ All tests passed!"
